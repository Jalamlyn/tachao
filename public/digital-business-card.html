<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字名片</title>
    <style>
        /* 保持基础样式不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #2563eb;
            --primary-light: #dbeafe;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --background: #f8fafc;
            --card-background: #ffffff;
            --hover-color: #eff6ff;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .card {
            background: var(--card-background);
            border-radius: var(--border-radius);
            padding: 32px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-color), #1d4ed8);
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }
        
        .profile-section {
            position: relative;
            text-align: center;
            margin-bottom: 32px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            border: 4px solid var(--card-background);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            object-fit: cover;
        }
        
        .name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            letter-spacing: -0.025em;
        }
        
        .title {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 24px;
        }
        
        /* 修改的联系方式布局样式 */
        .contact-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 8px;
            background: var(--card-background);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            text-align: center;
            height: 100%;
        }
        
        .contact-item i {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        
        .contact-item span {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            word-break: break-all;
        }
        
        .contact-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
            background: var(--hover-color);
        }
        
        /* 网站链接样式 */
        .website-link {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--card-background);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            color: inherit;
        }
        
        .website-link i {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: var(--primary-color);
            font-size: 18px;
        }
        
        .website-link span {
            flex: 1;
            font-size: 15px;
            color: var(--text-primary);
        }
        
        .website-arrow {
            color: var(--text-secondary);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .website-link:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
            background: var(--hover-color);
        }
        
        .website-link:hover .website-arrow {
            transform: translateX(4px);
        }
        
        /* Modal 样式保持不变 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.active {
            opacity: 1;
        }
        
        .modal-content {
            background: var(--card-background);
            padding: 32px;
            border-radius: var(--border-radius);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
            max-width: 90%;
            width: 360px;
        }
        
        .modal.active .modal-content {
            transform: scale(1);
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }
        
        .qr-code {
            width: 240px;
            height: 240px;
            margin: 0 auto 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        .modal-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .close {
            position: absolute;
            right: 16px;
            top: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        
        .close:hover {
            background: var(--primary-light);
            color: var(--primary-color);
        }
        
        /* 响应式布局 */
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px;
            }
            
            .avatar {
                width: 100px;
                height: 100px;
            }
            
            .name {
                font-size: 22px;
            }
            
            .contact-section {
                gap: 8px;
            }
            
            .contact-item {
                padding: 12px 8px;
            }
            
            .contact-item i {
                font-size: 20px;
                margin-bottom: 6px;
            }
            
            .contact-item span {
                font-size: 12px;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .contact-item, .website-link {
            animation: fadeIn 0.5s ease backwards;
        }
        
        .contact-item:nth-child(1) { animation-delay: 0.1s; }
        .contact-item:nth-child(2) { animation-delay: 0.2s; }
        .contact-item:nth-child(3) { animation-delay: 0.3s; }
        .website-link { animation-delay: 0.4s; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</head>
<body>
    <div class="card">
        <div class="profile-section">
            <img src="/api/placeholder/120/120" alt="头像" class="avatar">
            <h1 class="name">张三</h1>
            <p class="title">UI/UX Designer</p>
        </div>
        
        <div class="contact-section">
            <div class="contact-item" onclick="showWechat()">
                <i class="fab fa-weixin"></i>
                <span>微信</span>
            </div>
            
            <div class="contact-item" onclick="copyEmail()">
                <i class="far fa-envelope"></i>
                <span>邮箱</span>
            </div>
            
            <div class="contact-item" onclick="callPhone()">
                <i class="fas fa-phone"></i>
                <span>电话</span>
            </div>
        </div>

        <a href="http://www.mobenai.com.cn" target="_blank" class="website-link">
            <i class="fas fa-globe"></i>
            <span>访问官网</span>
            <i class="fas fa-arrow-right website-arrow"></i>
        </a>
    </div>

    <div id="wechatModal" class="modal">
        <div class="modal-content">
            <div class="close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </div>
            <h2 class="modal-title">扫码添加微信好友</h2>
            <img src="/api/placeholder/240/240" alt="微信二维码" class="qr-code">
            <p class="modal-subtitle">请使用微信扫描二维码</p>
        </div>
    </div>

    <script>
        function showWechat() {
            const modal = document.getElementById('wechatModal');
            modal.style.display = 'flex';
            modal.offsetHeight;
            modal.classList.add('active');
        }
        
        function closeModal() {
            const modal = document.getElementById('wechatModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }
        
        function copyEmail() {
            const email = 'zhangsan@example.com';
            navigator.clipboard.writeText(email).then(() => {
                showToast('邮箱已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }
        
        function callPhone() {
            window.location.href = 'tel:13800138000';
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 32px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 1000;
                animation: fadeInOut 2s ease forwards;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                document.body.removeChild(toast);
            }, 2000);
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('wechatModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
