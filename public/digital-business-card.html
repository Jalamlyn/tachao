<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOBENAI | Jalam吕越男</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-color: #000000;
        --text-primary: #ffffff;
        --text-secondary: #a0a0a0;
        --background: #000000;
        --card-background: rgba(20, 20, 20, 0.7);
        --hover-color: rgba(30, 30, 30, 0.8);
        --border-radius: 16px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: var(--background);
        color: var(--text-primary);
        line-height: 1.5;
      }

      .card {
        background: var(--card-background);
        border-radius: var(--border-radius);
        padding: 32px;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: var(--transition);
      }

      .share-button {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text-primary);
        transition: var(--transition);
      }

      .share-button:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
      }

      .profile-section {
        position: relative;
        text-align: center;
        margin-bottom: 32px;
      }

      .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        margin: 0 auto 20px;
        display: block;
        border: 4px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        object-fit: cover;
        transition: var(--transition);
      }

      .avatar:hover {
        transform: scale(1.05);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .name {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-primary);
        letter-spacing: -0.025em;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      }

      .contact-section {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 32px;
      }

      .contact-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        text-align: center;
        height: 100%;
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .contact-item i {
        font-size: 24px;
        color: var(--text-primary);
        margin-bottom: 8px;
        transition: var(--transition);
      }

      .contact-item:hover {
        transform: translateY(-2px);
        background: var(--hover-color);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .contact-item:hover i {
        transform: scale(1.1);
      }

      .logo {
        text-align: center;
        margin-top: 20px;
      }

      .logo img {
        height: 30px;
        opacity: 0.8;
        transition: var(--transition);
      }

      .logo img:hover {
        opacity: 1;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 80vh;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        justify-content: center;
        align-items: center;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .modal.active {
        opacity: 1;
      }

      .modal-content {
        background: var(--card-background);
        padding: 32px;
        border-radius: var(--border-radius);
        text-align: center;
        transform: scale(0.9);
        transition: transform 0.3s ease;
        position: relative;
        max-width: 90%;
        width: 360px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .modal.active .modal-content {
        transform: scale(1);
      }

      .modal-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 24px;
        color: var(--text-primary);
      }

      .qr-code {
        width: 240px;
        margin: 0 auto 24px;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }

      .modal-subtitle {
        color: var(--text-secondary);
        font-size: 14px;
      }

      .close {
        position: absolute;
        right: 16px;
        top: 16px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: var(--transition);
        color: var(--text-secondary);
      }

      .close:hover {
        background: rgba(255, 255, 255, 0.2);
        color: var(--text-primary);
      }

      @media (max-width: 480px) {
        .card {
          padding: 24px 16px;
        }

        .avatar {
          width: 100px;
          height: 100px;
        }

        .name {
          font-size: 22px;
        }

        .contact-section {
          gap: 8px;
        }

        .contact-item {
          padding: 12px 8px;
        }

        .contact-item i {
          font-size: 20px;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .contact-item {
        animation: fadeIn 0.5s ease backwards;
      }

      .contact-item:nth-child(1) {
        animation-delay: 0.1s;
      }
      .contact-item:nth-child(2) {
        animation-delay: 0.2s;
      }
      .contact-item:nth-child(3) {
        animation-delay: 0.3s;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  </head>
  <body>
    <div class="card">
      <button class="share-button" onclick="shareCard()">
        <i class="fas fa-share-alt"></i>
      </button>

      <div class="profile-section">
        <img src="./jalam-tx.png" alt="头像" class="avatar" />
        <h1 class="name">Jalam吕越男</h1>
        <h3 style="color: #999; font-weight: 400">COO | 首席运营官</h3>
      </div>

      <div class="contact-section">
        <div class="contact-item" onclick="showWechat()">
          <i class="fab fa-weixin"></i>
        </div>

        <div class="contact-item" onclick="copyEmail()">
          <i class="far fa-envelope"></i>
        </div>

        <div class="contact-item" onclick="callPhone()">
          <i class="fas fa-phone"></i>
        </div>
      </div>

      <div class="logo">
        <div class="contact-item">
          <a style="color: white" href="https://www.mobenai.com.cn"><i class="fas fa-web"></i></a>
        </div>
      </div>
    </div>

    <div id="wechatModal" class="modal">
      <div class="modal-content">
        <div class="close" onclick="closeModal()">
          <i class="fas fa-times"></i>
        </div>
        <h2 class="modal-title">扫码添加微信好友</h2>
        <img src="./jalam.png" alt="微信二维码" class="qr-code" />
        <p class="modal-subtitle">请使用微信扫描二维码</p>
      </div>
    </div>

    <script>
      function showWechat() {
        const modal = document.getElementById("wechatModal")
        modal.style.display = "flex"
        modal.offsetHeight
        modal.classList.add("active")
      }

      function closeModal() {
        const modal = document.getElementById("wechatModal")
        modal.classList.remove("active")
        setTimeout(() => {
          modal.style.display = "none"
        }, 300)
      }

      function copyEmail() {
        const email = "jalam@muselink.cc"
        navigator.clipboard
          .writeText(email)
          .then(() => {
            showToast("邮箱已复制到剪贴板")
          })
          .catch((err) => {
            console.error("复制失败:", err)
          })
      }

      function callPhone() {
        window.location.href = "tel:13800138000"
      }

      function shareCard() {
        if (navigator.share) {
          navigator
            .share({
              title: "Jalam的数字名片",
              text: "这是我的数字名片,让我们保持联系!",
              url: window.location.href,
            })
            .catch((error) => console.log("分享失败", error))
        } else {
          showToast("您的浏览器不支持分享功能")
        }
      }

      function showToast(message) {
        const toast = document.createElement("div")
        toast.style.cssText = `
          position: fixed;
          bottom: 32px;
          left: 50%;
          transform: translateX(-50%);
          background: rgba(0, 0, 0, 0.8);
          color: white;
          padding: 12px 24px;
          border-radius: 8px;
          font-size: 14px;
          z-index: 1000;
          animation: fadeInOut 2s ease forwards;
        `
        toast.textContent = message
        document.body.appendChild(toast)

        setTimeout(() => {
          document.body.removeChild(toast)
        }, 2000)
      }

      window.onclick = function (event) {
        const modal = document.getElementById("wechatModal")
        if (event.target == modal) {
          closeModal()
        }
      }
    </script>
  </body>
</html>
